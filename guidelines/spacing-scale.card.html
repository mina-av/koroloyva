<!-- @dsCard group="Spacing" viewport="700x210" name="Spacing scale" subtitle="4px base · generous rhythm" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 30px; background: var(--surface-paper); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 14px; padding: 5px 0; }
  .bar { height: 14px; background: var(--brass-500); border-radius: var(--radius-xs); }
  .lbl { width: 92px; font-size: 11px; color: var(--stone-500); flex: none; }
  .lbl b { color: var(--ink-900); font-weight: 600; }
</style>
</head>
<body>
  <div class="row"><span class="lbl"><b>space-2</b> · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="lbl"><b>space-4</b> · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="lbl"><b>space-5</b> · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="lbl"><b>space-6</b> · 32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="lbl"><b>space-8</b> · 48</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="lbl"><b>space-10</b> · 64</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="lbl"><b>space-12</b> · 80</span><span class="bar" style="width:80px"></span></div>
</body>
</html>
