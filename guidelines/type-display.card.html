<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 30px; background: var(--surface-paper); }
  .big { font-family: var(--font-display); font-weight: 400; font-size: 76px; line-height: .98; letter-spacing: -.01em; color: var(--ink-900); }
  .sub { font-family: var(--font-display); font-style: italic; font-weight: 400; font-size: 30px; color: var(--brass-600); margin-top: 6px; }
  .meta { font-family: var(--font-sans); font-size: 12px; letter-spacing: .04em; color: var(--stone-500); margin-top: 16px; }
</style>
</head>
<body>
  <div class="big">Vermögen in Lagen.</div>
  <div class="sub">Investieren mit Haltung</div>
  <div class="meta">Cormorant Garamond · 300 / 400 / 500 / 600 · roman &amp; italic</div>
</body>
</html>
