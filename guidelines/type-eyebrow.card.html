<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 30px; background: var(--surface-paper); display: flex; flex-direction: column; gap: 18px; }
  .eyebrow { font-family: var(--font-sans); font-size: 12px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; color: var(--brass-600); }
  .eyebrow.ink { color: var(--ink-900); }
  .eyebrow.muted { color: var(--stone-400); }
  .meta { font-family: var(--font-sans); font-size: 12px; color: var(--stone-400); }
</style>
</head>
<body>
  <div class="eyebrow">Services &middot; Beratung</div>
  <div class="eyebrow ink">Ausgewählte Objekte</div>
  <div class="eyebrow muted">Seit 2014 &middot; München</div>
  <div class="meta">font-size 12 · weight 600 · tracking 0.22em · uppercase</div>
</body>
</html>
