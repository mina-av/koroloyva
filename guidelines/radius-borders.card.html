<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 30px; background: var(--surface-paper); font-family: var(--font-sans); }
  .row { display: flex; gap: 24px; align-items: flex-end; }
  .box { width: 86px; height: 70px; background: var(--sand-100); border: 1px solid var(--sand-300); display: flex; align-items: center; justify-content: center; }
  .cap { font-size: 11px; color: var(--stone-500); margin-top: 8px; }
  .cap b { color: var(--ink-900); font-weight: 600; }
  .col { display: flex; flex-direction: column; align-items: center; }
  .strong { border: 1.5px solid var(--ink-900); background: var(--paper); }
  .acc { border: 1px solid var(--brass-500); background: var(--champagne-200); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:0"></div><div class="cap"><b>none</b> 0px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="cap"><b>xs</b> 2px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="cap"><b>sm</b> 4px</div></div>
    <div class="col"><div class="box strong" style="border-radius:0"></div><div class="cap"><b>border</b> strong</div></div>
    <div class="col"><div class="box acc" style="border-radius:0"></div><div class="cap"><b>border</b> accent</div></div>
  </div>
</body>
</html>
