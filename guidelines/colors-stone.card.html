<!-- @dsCard group="Colors" viewport="700x150" name="Stone — taupe neutrals" subtitle="Secondary text, muted UI" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-paper); }
  .row { display: flex; gap: 0; }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; }
  .sw span { font-family: var(--font-sans); font-size: 11px; letter-spacing: .04em; color: var(--ink-900); }
  .name { font-weight: 600; }
  .hex { opacity: .65; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--stone-500)"><span class="name">stone-500</span><span class="hex">#7C7264</span></div>
    <div class="sw" style="background:var(--stone-400)"><span class="name">stone-400</span><span class="hex">#9B9181</span></div>
    <div class="sw" style="background:var(--stone-300)"><span class="name">stone-300</span><span class="hex">#BCB2A2</span></div>
    <div class="sw" style="background:var(--stone-200)"><span class="name">stone-200</span><span class="hex">#D8CFBF</span></div>
  </div>
</body>
</html>
