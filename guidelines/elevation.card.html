<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px; background: var(--cream-50); font-family: var(--font-sans); }
  .row { display: flex; gap: 26px; }
  .card { flex: 1; height: 90px; background: var(--paper); border-radius: var(--radius-sm); display: flex; align-items: flex-end; padding: 10px; }
  .card span { font-size: 11px; color: var(--stone-500); }
  .card b { color: var(--ink-900); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="card" style="box-shadow:var(--shadow-xs)"><span><b>xs</b> · hover lift</span></div>
    <div class="card" style="box-shadow:var(--shadow-sm)"><span><b>sm</b> · cards</span></div>
    <div class="card" style="box-shadow:var(--shadow-md)"><span><b>md</b> · raised</span></div>
    <div class="card" style="box-shadow:var(--shadow-lg)"><span><b>lg</b> · overlays</span></div>
  </div>
</body>
</html>
