<!-- @dsCard group="Colors" viewport="700x150" name="Brass — the accent" subtitle="Gold, used sparingly. One accent only." -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-paper); }
  .row { display: flex; gap: 0; }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; }
  .sw span { font-family: var(--font-sans); font-size: 11px; letter-spacing: .04em; }
  .name { font-weight: 600; }
  .hex { opacity: .7; }
  .dark span { color: var(--cream-50); }
  .light span { color: var(--ink-900); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw dark" style="background:var(--brass-700)"><span class="name">brass-700</span><span class="hex">#6F5526</span></div>
    <div class="sw dark" style="background:var(--brass-600)"><span class="name">brass-600</span><span class="hex">#8A6D34</span></div>
    <div class="sw dark" style="background:var(--brass-500)"><span class="name">brass-500 ·accent</span><span class="hex">#A8854B</span></div>
    <div class="sw light" style="background:var(--brass-400)"><span class="name">brass-400</span><span class="hex">#C2A062</span></div>
    <div class="sw light" style="background:var(--champagne-200)"><span class="name">champagne-200</span><span class="hex">#E8DABB</span></div>
  </div>
</body>
</html>
