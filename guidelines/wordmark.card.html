<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; display: grid; grid-template-columns: 1fr 1fr; font-family: var(--font-sans); }
  .panel { padding: 36px 30px; display: flex; flex-direction: column; gap: 6px; align-items: center; justify-content: center; min-height: 220px; }
  .light { background: var(--cream-50); }
  .dark { background: var(--ink-900); }
  .mark { font-family: var(--font-display); font-weight: 500; font-size: 36px; letter-spacing: .02em; }
  .light .mark { color: var(--ink-900); }
  .dark .mark { color: var(--cream-50); }
  .tag { font-size: 9.5px; font-weight: 600; letter-spacing: .32em; text-indent: .32em; text-transform: uppercase; }
  .light .tag { color: var(--brass-600); }
  .dark .tag { color: var(--brass-400); }
</style>
</head>
<body>
  <div class="panel light">
    <div class="mark">Тамила Королёва</div>
    <div class="tag">Недвижимость · Строительство</div>
  </div>
  <div class="panel dark">
    <div class="mark">Тамила Королёва</div>
    <div class="tag">Недвижимость · Строительство</div>
  </div>
</body>
</html>
