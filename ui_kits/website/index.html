<!-- @startingPoint section="Website" subtitle="Лендинг Тамилы Королёвой — недвижимость и строительство" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тамила Королёва — Консультации по недвижимости и строительству</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--cream-50); }
  .kit-mobile-toggle { display: none; }
  @media (max-width: 980px) {
    .kit-desktop-nav { display: none !important; }
    .kit-mobile-toggle { display: block !important; }
    .kit-paths-grid, .kit-owners-grid, .kit-business-grid { grid-template-columns: 1fr !important; }
    .kit-process-grid { grid-template-columns: 1fr 1fr !important; }
    .kit-problem-grid, .kit-network-grid, .kit-about-grid, .kit-footer-grid, .kit-form-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
  }
  @media (max-width: 600px) {
    .kit-process-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="top"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel" src="Parts.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Problem.jsx"></script>
<script type="text/babel" src="Paths.jsx"></script>
<script type="text/babel" src="Owners.jsx"></script>
<script type="text/babel" src="Business.jsx"></script>
<script type="text/babel" src="Network.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="Process.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel" data-presets="react">
  function App() {
    const [mobileOpen, setMobileOpen] = React.useState(false);
    React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

    const onNav = (id) => {
      setMobileOpen(false);
      const el = id === "top" ? document.getElementById("top") : document.getElementById(id);
      if (el) {
        const y = el.getBoundingClientRect().top + window.scrollY - 82;
        window.scrollTo({ top: Math.max(0, y), behavior: "smooth" });
      }
    };

    return (
      <React.Fragment>
        <window.Header onNav={onNav} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} />
        <window.Hero onNav={onNav} />
        <window.Problem />
        <window.Paths onNav={onNav} />
        <window.Owners onNav={onNav} />
        <window.Business onNav={onNav} />
        <window.Network onNav={onNav} />
        <window.About />
        <window.Process />
        <window.Contact />
        <window.Footer onNav={onNav} />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
