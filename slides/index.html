<!-- @dsCard group="Slides" viewport="1280x720" name="Deck — Investoren-Präsentation" subtitle="5 Slides · Pfeiltasten / Klick zum Blättern" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Korolyova — Investoren-Präsentation</title>
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; height: 100%; background: #0d0b09; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #canvas { width: 1280px; height: 720px; transform-origin: center center; box-shadow: var(--shadow-lg); }
  .nav { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 50;
    display: flex; align-items: center; gap: 14px; background: rgba(22,19,15,0.7);
    backdrop-filter: blur(10px); border: 1px solid rgba(247,242,233,0.16);
    border-radius: 999px; padding: 8px 14px; }
  .nav button { cursor: pointer; background: transparent; border: 0; color: var(--cream-50);
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .nav button:hover { background: rgba(247,242,233,0.12); }
  .nav span { font-family: var(--font-sans); font-size: 12px; letter-spacing: 0.16em;
    color: rgba(247,242,233,0.8); min-width: 56px; text-align: center; }
</style>
</head>
<body>
<div id="stage"><div id="canvas"><div id="root"></div></div></div>
<div class="nav">
  <button id="prev" aria-label="Zurück"><i data-lucide="chevron-left"></i></button>
  <span id="counter">01 / 07</span>
  <button id="next" aria-label="Weiter"><i data-lucide="chevron-right"></i></button>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../_ds_bundle.js"></script>
<script type="text/babel" src="Slides.jsx"></script>

<script type="text/babel" data-presets="react">
  const { TitleSlide, ProblemSlide, PathsSlide, OwnersSlide, BusinessSlide, AboutSlide, ContactSlide } = window;
  const SLIDES = [TitleSlide, ProblemSlide, PathsSlide, OwnersSlide, BusinessSlide, AboutSlide, ContactSlide];
  const KEY = "korolyova_deck_slide";

  let idx = Math.min(SLIDES.length - 1, Math.max(0, parseInt(localStorage.getItem(KEY) || "0", 10) || 0));
  const root = ReactDOM.createRoot(document.getElementById("root"));

  function pad(n) { return String(n + 1).padStart(2, "0"); }

  function render() {
    const Slide = SLIDES[idx];
    root.render(<Slide />);
    document.getElementById("counter").textContent = pad(idx) + " / " + pad(SLIDES.length - 1);
    localStorage.setItem(KEY, String(idx));
    setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
  }
  function go(d) { idx = Math.min(SLIDES.length - 1, Math.max(0, idx + d)); render(); }

  function scale() {
    const s = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
    document.getElementById("canvas").style.transform = "scale(" + s + ")";
  }
  window.addEventListener("resize", scale);
  document.getElementById("prev").onclick = () => go(-1);
  document.getElementById("next").onclick = () => go(1);
  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); go(1); }
    if (e.key === "ArrowLeft") { e.preventDefault(); go(-1); }
  });

  scale(); render();
  window.lucide && window.lucide.createIcons();
</script>
</body>
</html>
