<!-- @dsCard group="Components" viewport="700x780" name="Real estate — Cards, Stats, Quote" subtitle="Listings, services, figures, testimonials" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 30px 32px; background: var(--cream-50); }
  .lab { font-family: var(--font-sans); font-size: 10px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--stone-400); margin: 0 0 14px; }
  .grp { margin-bottom: 30px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .dark { background: var(--ink-900); padding: 40px 34px; border-radius: var(--radius-sm); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>

  <script type="text/babel">
    const { PropertyCard, ServiceCard, StatBlock, Quote, Divider } = window.KorolyovaDesignSystem_d31d2b;
    const IMG1 = "https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=900&q=80";
    const IMG2 = "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=900&q=80";

    function Demo() {
      return (
        <div>
          <div className="grp">
            <div className="lab">PropertyCard</div>
            <div className="grid2">
              <PropertyCard image={IMG1} location="München · Bogenhausen"
                title="Villa am Englischen Garten" price="€ 4.250.000"
                specs={["5 Zimmer", "240 m²", "Garten"]} status="Exklusiv" />
              <PropertyCard image={IMG2} location="Starnberg · Seeblick"
                title="Anwesen mit Privatsteg" price="€ 7.900.000"
                specs={["7 Zimmer", "410 m²", "Seezugang"]} status="Off-Market" />
            </div>
          </div>

          <div className="grp">
            <div className="lab">ServiceCard</div>
            <div className="grid3">
              <ServiceCard index="01" icon="building-2" title="Portfolio-Strategie"
                description="Aufbau und Steuerung eines renditestarken Immobilienportfolios." />
              <ServiceCard index="02" icon="line-chart" title="Markt-Analyse"
                description="Datenbasierte Bewertung von Lagen, Rendite und Wertentwicklung." />
              <ServiceCard index="03" icon="graduation-cap" title="Investment-Kurse"
                description="Strukturiertes Wissen — von der ersten Bewertung bis zur Finanzierung." />
            </div>
          </div>

          <div className="dark">
            <div className="stats">
              <StatBlock value="€ 1,2 Mrd." label="Vermitteltes Volumen" onDark />
              <StatBlock value="7,4 %" label="Ø Rendite p.a." onDark />
              <StatBlock value="320+" label="Begleitete Anleger" onDark />
            </div>
            <div style={{ margin: "32px 0" }}><Divider onDark /></div>
            <Quote author="Anna Korolyova" role="Gründerin" onDark>
              Lage ist nicht teuer. Lage ist das Einzige, das bleibt.
            </Quote>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
  </script>
</body>
</html>
